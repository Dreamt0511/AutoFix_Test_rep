name: CI Check

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 语法检查
      id: syntax
      continue-on-error: true
      run: |
        FAIL=0
        while IFS= read -r -d '' f; do
          if ! python - "$f" << 'PYEOF'
        import ast, sys

        filepath = sys.argv[1]
        with open(filepath) as fh:
            try:
                ast.parse(fh.read())
            except SyntaxError as e:
                print(f'  File "{filepath}", line {e.lineno}')
                if e.text:
                    print(f'    {e.text.rstrip()}')
                if e.offset:
                    print(f'    {" " * (e.offset - 1)}^')
                print(f'SyntaxError: {e.msg}')
                sys.exit(1)
        PYEOF
          then
            echo "Syntax error: $f"
            FAIL=1
          fi
        done < <(find . -name "*.py" -not -path "./.venv/*" -not -path "./.git/*" -print0)
        exit $FAIL

    - name: 运行测试
      id: test
      continue-on-error: true
      run: pytest -v --tb=short

    - name: 逐文件运行检查
      id: runtime
      timeout-minutes: 5
      continue-on-error: true
      run: |
        FAIL=0
        find . -name "*.py" \
          -not -path "./.venv/*" \
          -not -path "./.git/*" \
          -not -path "./tests/*" \
          -not -name "test_*" \
          -print0 | while IFS= read -r -d '' f; do
            if ! timeout 10 python "$f" 2>&1; then
              echo "Runtime error: $f"
              FAIL=1
            fi
          done
        exit $FAIL

    - name: 汇总结果
      if: always()
      env:
        SYNTAX_OUTCOME: ${{ steps.syntax.outcome }}
        TEST_OUTCOME: ${{ steps.test.outcome }}
        RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
      run: |
        echo "========== Check Summary =========="
        HAS_ERROR=false

        if [ "$SYNTAX_OUTCOME" = "failure" ]; then
          echo "FAIL: syntax check"; HAS_ERROR=true
        else
          echo "PASS: syntax check"
        fi

        if [ "$TEST_OUTCOME" = "failure" ]; then
          echo "FAIL: tests"; HAS_ERROR=true
        else
          echo "PASS: tests"
        fi

        if [ "$RUNTIME_OUTCOME" = "failure" ]; then
          echo "FAIL: runtime check"; HAS_ERROR=true
        else
          echo "PASS: runtime check"
        fi

        if [ "$HAS_ERROR" = "true" ]; then
          echo "Errors found, exiting 1"; exit 1
        else
          echo "All passed"; exit 0
        fi
