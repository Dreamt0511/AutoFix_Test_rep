name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤：下载并提取 Termux Python 运行环境（aarch64）
      # 从 Termux 官方仓库获取 Python 3.13 deb 包以及依赖的 libandroid-support，
      # 解压后将二进制、动态库和标准库复制到 app/src/main/assets/python/ 目录，
      # 供 Android 应用内置使用。
      #
      # 为什么需要 libandroid-support：
      #   Termux 编译的 Python 依赖 libandroid-support.so（提供 Android bionic libc
      #   缺失的 locale/multibyte 支持）。该库不是 Android 系统库，必须一起打包。
      - name: Download bundled Python
        run: |
          mkdir -p app/src/main/assets/python
          cd /tmp

          # --- Python 解释器 ---
          curl -sL -o python.deb "https://packages.termux.dev/apt/termux-main/pool/main/p/python/python_3.13.13-1_aarch64.deb"
          mkdir -p py-extract && cd py-extract
          ar x ../python.deb
          tar xf data.tar.xz
          mkdir -p $GITHUB_WORKSPACE/app/src/main/assets/python/bin
          mkdir -p $GITHUB_WORKSPACE/app/src/main/assets/python/lib
          cp -a data/data/com.termux/files/usr/bin/python3.13 $GITHUB_WORKSPACE/app/src/main/assets/python/bin/
          cp -a data/data/com.termux/files/usr/lib/libpython3.13.so $GITHUB_WORKSPACE/app/src/main/assets/python/lib/
          cp -a data/data/com.termux/files/usr/lib/python3.13 $GITHUB_WORKSPACE/app/src/main/assets/python/lib/

          # --- libandroid-support（Python 的 Termux 依赖库）---
          cd /tmp
          curl -sL -o libas.deb "https://packages.termux.dev/apt/termux-main/pool/main/liba/libandroid-support/libandroid-support_29-1_aarch64.deb"
          mkdir -p libas-extract && cd libas-extract
          ar x ../libas.deb
          tar xf data.tar.xz
          cp -a data/data/com.termux/files/usr/lib/libandroid-support.so \
                $GITHUB_WORKSPACE/app/src/main/assets/python/lib/

          # --- Termux 依赖库（Python C 扩展需要）---
          # Python 的 .so 扩展模块链接了 Termux 的系统库，运行时通过
          # LD_LIBRARY_PATH 查找。这些库不在 Android 系统目录中，必须打包。
          cd /tmp

          download_lib() {
            local url="$1" name="$2"
            local deb="/tmp/${name}.deb"
            local dir="/tmp/${name}-extract"
            curl -sSL -o "$deb" "$url"
            mkdir -p "$dir" && cd "$dir"
            ar x "$deb" 2>/dev/null
            tar xf data.tar.xz 2>/dev/null
            find data/data/com.termux/files/usr/lib -name 'lib*.so*' \( -type f -o -type l \) \
              -exec cp -an {} $GITHUB_WORKSPACE/app/src/main/assets/python/lib/ \;
            cd /tmp && rm -rf "$deb" "$dir"
          }

          # zlib — libz.so.1 (zlib, binascii 等模块依赖)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/z/zlib/zlib_1.3.2_aarch64.deb" "zlib"
          # OpenSSL — libssl.so.3, libcrypto.so.3 (_ssl, hashlib HTTPS)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/o/openssl/openssl_1%3A3.6.2_aarch64.deb" "openssl"
          # libffi — libffi.so (ctypes)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/libf/libffi/libffi_3.5.2_aarch64.deb" "libffi"
          # libsqlite — libsqlite3.so (_sqlite3)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/libs/libsqlite/libsqlite_3.53.1_aarch64.deb" "libsqlite"
          # libexpat — libexpat.so.1 (pyexpat XML 解析)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/libe/libexpat/libexpat_2.8.1_aarch64.deb" "libexpat"
          # libbz2 — libbz2.so.1.0 (_bz2 压缩)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/libb/libbz2/libbz2_1.0.8-8_aarch64.deb" "libbz2"
          # liblzma — liblzma.so.5 (_lzma XZ 压缩)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/libl/liblzma/liblzma_5.8.3_aarch64.deb" "liblzma"
          # libandroid-posix-semaphore — (_multiprocessing)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/liba/libandroid-posix-semaphore/libandroid-posix-semaphore_0.1-4_aarch64.deb" "android-posix-semaphore"
          # ncurses — libncursesw.so.6 (_curses)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/n/ncurses/ncurses_6.6.20260307%2Breally6.5.20250830_aarch64.deb" "ncurses"
          # ncurses-ui-libs — libpanelw.so.6 (_curses_panel, 依赖 libncursesw.so.6)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/n/ncurses-ui-libs/ncurses-ui-libs_6.6.20260307%2Breally6.5.20250830_aarch64.deb" "ncurses-ui-libs"
          # gdbm — libgdbm.so, libgdbm_compat.so (_gdbm, _dbm)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/g/gdbm/gdbm_1.26-1_aarch64.deb" "gdbm"
          # readline — libreadline.so.8 (readline, 依赖 libncursesw.so.6)
          download_lib "https://packages.termux.dev/apt/termux-main/pool/main/r/readline/readline_8.3.3_aarch64.deb" "readline"

          # --- 符号链接 ---
          cd $GITHUB_WORKSPACE/app/src/main/assets/python/bin
          ln -sf python3.13 python3
          ln -sf python3.13 python
          ln -sf ../lib/libpython3.13.so ../lib/libpython3.so

          # --- 安装 pip 到 assets 的 site-packages ---
          # 从 GitHub 下载 pip 和 setuptools 的 pure Python wheel
          # 这样运行时不需要 ensurepip，直接有 pip 可用
          cd $GITHUB_WORKSPACE/app/src/main/assets/python/lib
          mkdir -p python3.13/site-packages
          cd python3.13/site-packages

          # 下载 pip wheel (pure Python) - 使用官方镜像 URL
          curl -sL -o pip.whl "https://pypi.org/packages/py3/p/pip/pip-24.3.1-py3-none-any.whl"
          unzip -q -o pip.whl
          rm pip.whl

          # 下载 setuptools wheel (pure Python) - 使用官方镜像 URL
          curl -sL -o setuptools.whl "https://pypi.org/packages/py3/s/setuptools/setuptools-75.1.0-py3-none-any.whl"
          unzip -q -o setuptools.whl
          rm setuptools.whl

          # sitecustomize.py: Python 启动时将 site-packages 加入 sys.path
          # 注意：不能使用 .pth 文件，因为 site-packages 此时尚未在 sys.path 上
          cd $GITHUB_WORKSPACE/app/src/main/assets/python/lib/python3.13
          printf '%s\n' \
            'import sys, os' \
            'sys.path.insert(0, os.path.join(os.path.dirname(__file__), "site-packages"))' \
            > sitecustomize.py

          # --- 修改 RPATH（关键修复）---
          # Termux 编译的 python3.13 和 libpython3.13.so 硬编码了
          # RUNPATH=/data/data/com.termux/files/usr/lib，导致 linker 在
          # 设备上找不到库（即使设置了 LD_LIBRARY_PATH，某些 ROM 也可能忽略它）。
          #
          # 改成 $ORIGIN/../lib，linker 根据二进制路径相对定位库文件，
          # 完全不依赖 LD_LIBRARY_PATH。
          sudo apt-get install -y -qq patchelf
          patchelf --set-rpath '$ORIGIN/../lib' \
            $GITHUB_WORKSPACE/app/src/main/assets/python/bin/python3.13
          patchelf --set-rpath '$ORIGIN/../lib' \
            $GITHUB_WORKSPACE/app/src/main/assets/python/lib/libpython3.13.so

          echo "Python bundled size:"
          du -sh $GITHUB_WORKSPACE/app/src/main/assets/python/
          echo "File count:"
          find $GITHUB_WORKSPACE/app/src/main/assets/python/ -type f | wc -l

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;32.0.0"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > pocketagent.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketAgent-release
          path: app/build/outputs/apk/release/app-release.apk